<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOSS · 智能对话</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #060c14;
  --accent:   #00c8ff;
  --green:    #00e87a;
  --amber:    #ffaa00;
  --text:     #6ca8c8;
  --text-hi:  #d0eaf8;
  --text-lo:  #2e5268;
  --border:   rgba(0,200,255,0.1);
  --border-hi:rgba(0,200,255,0.28);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg); color: var(--text-hi);
  font-size: 13px; -webkit-font-smoothing: antialiased; overflow: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    radial-gradient(ellipse 90% 55% at 50% -5%, rgba(0,160,255,0.07) 0%, transparent 65%),
    linear-gradient(rgba(0,200,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,255,0.018) 1px, transparent 1px);
  background-size: 100% 100%, 48px 48px, 48px 48px;
  pointer-events: none;
}

/* ── Full-screen chat layout ── */
.chat {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100vh;
  background: rgba(9,18,30,0.88);
  backdrop-filter: blur(10px);
}

/* ── Corner brackets ── */
.chat::before, .chat::after,
.corner-tr, .corner-bl {
  content: '';
  position: fixed; z-index: 20; pointer-events: none;
  width: 22px; height: 22px;
}
.chat::before { top: 0; left: 0; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); opacity: .6; }
.chat::after  { bottom: 0; right: 0; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); opacity: .6; }
.corner-tr    { top: 0; right: 0; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); opacity: .6; }
.corner-bl    { bottom: 0; left: 0; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); opacity: .6; }

/* ── Messages ── */
.messages {
  flex: 1; overflow-y: auto;
  padding: 22px 26px; display: flex; flex-direction: column; gap: 18px;
}
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.18); border-radius: 2px; }
.messages::-webkit-scrollbar-track { background: transparent; }

.msg-row {
  display: flex; align-items: flex-start; gap: 10px;
  animation: msgIn 0.25s cubic-bezier(0.22,1,0.36,1);
}
.msg-row.user { flex-direction: row-reverse; }
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.avatar {
  width: 30px; height: 30px; flex-shrink: 0;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 500; letter-spacing: 0.06em;
}
.avatar.bot  { background: rgba(0,200,255,0.08); border: 1px solid rgba(0,200,255,0.22); color: var(--accent); }
.avatar.user { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: var(--text); font-size: 9px; }

.msg-body { display: flex; flex-direction: column; max-width: 76%; }
.msg-row.user .msg-body { align-items: flex-end; }

.bubble {
  padding: 10px 15px; font-size: 13px; line-height: 1.75;
  word-break: break-word; white-space: pre-wrap;
  border-radius: 3px; position: relative;
}
.bot  .bubble { background: rgba(0,200,255,0.04); border: 1px solid rgba(0,200,255,0.1); color: var(--text-hi); border-top-left-radius: 1px; }
.user .bubble { background: rgba(0,200,255,0.09); border: 1px solid rgba(0,200,255,0.18); color: var(--text-hi); border-top-right-radius: 1px; }

.bubble[data-streaming]::after {
  content: '█'; animation: cur 0.65s step-end infinite;
  color: var(--accent); font-size: 11px; margin-left: 2px;
}
@keyframes cur { 0%,100%{opacity:.9} 50%{opacity:0} }

.msg-time { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-lo); margin-top: 5px; letter-spacing: 0.04em; }

/* Thinking */
.thinking { margin-top: 6px; }
.thinking summary {
  cursor: pointer; list-style: none;
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  color: var(--accent); opacity: .5; padding: 2px 4px;
  display: flex; align-items: center; gap: 5px;
  text-transform: uppercase; letter-spacing: .08em; user-select: none;
  transition: opacity .15s;
}
.thinking summary:hover { opacity: .85; }
.thinking summary::-webkit-details-marker { display: none; }
.thinking summary::before { content:'▶'; font-size:7px; transition: transform .2s; }
.thinking[open] summary::before { transform: rotate(90deg); }
.thinking-body { margin-top: 4px; display: flex; flex-direction: column; gap: 3px; }
.thought {
  background: rgba(0,0,0,.3); border-left: 1px solid rgba(0,200,255,.18);
  padding: 6px 10px; font-family: 'IBM Plex Mono', monospace; font-size: 11px;
  color: var(--text); opacity: .75; white-space: pre-wrap; word-break: break-word;
}
.thought-idx { color: var(--accent); opacity: .45; margin-right: 6px; }

/* Typing */
.typing-bubble { display: flex; gap: 5px; align-items: center; padding: 12px 15px; }
.dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; opacity: .35; animation: wave 1.3s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: .15s; }
.dot:nth-child(3) { animation-delay: .3s; }
@keyframes wave { 0%,60%,100%{transform:translateY(0);opacity:.35} 30%{transform:translateY(-5px);opacity:.9} }

/* ── Input area ── */
.input-area {
  border-top: 1px solid var(--border);
  background: rgba(0,200,255,0.02);
  padding: 12px 26px 14px; flex-shrink: 0;
}

.cmd-row { display: flex; align-items: flex-end; gap: 10px; }

.cmd-gt { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: var(--accent); opacity: .6; padding-bottom: 7px; flex-shrink: 0; }

.input-wrap { flex: 1; }

.input-box {
  width: 100%; background: transparent;
  border: none; border-bottom: 1px solid rgba(0,200,255,0.18);
  padding: 6px 0 8px; font-size: 13px; line-height: 1.6;
  color: var(--text-hi); font-family: 'Noto Sans SC', 'IBM Plex Mono', monospace;
  resize: none; outline: none; max-height: 96px;
  caret-color: var(--accent); transition: border-color .2s;
}
.input-box:focus { border-bottom-color: var(--accent); }
.input-box::placeholder { color: var(--text-lo); font-size: 12px; }
.input-box:disabled { opacity: .35; cursor: not-allowed; }

.send-btn {
  width: 34px; height: 32px;
  background: rgba(0,200,255,0.08); border: 1px solid rgba(0,200,255,0.2);
  border-radius: 3px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); flex-shrink: 0;
  transition: background .15s, border-color .15s, transform .1s;
}
.send-btn:hover:not(:disabled) { background: rgba(0,200,255,0.15); border-color: rgba(0,200,255,0.38); }
.send-btn:active:not(:disabled) { transform: scale(0.91); }
.send-btn:disabled { opacity: .25; cursor: not-allowed; }
.send-btn svg { width: 14px; height: 14px; fill: currentColor; }

.input-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.hint-row { display: flex; align-items: center; gap: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-lo); letter-spacing: .04em; }
.kbd { display: inline-block; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); border-radius: 2px; padding: 1px 5px; font-size: 9px; color: var(--text); font-family: inherit; }
.input-status { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; color: var(--accent); opacity: .3; letter-spacing: .12em; text-transform: uppercase; }
</style>
</head>
<body>

<div class="chat">
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="msg-row bot">
      <div class="avatar bot">D</div>
      <div class="msg-body">
        <div class="bubble">系统就绪。我是 DOSS，低空飞行系统智能指控助手。

可执行以下操作：
• 查询无人机与机场实时状态
• 控制无人机飞行（起飞 / 导航 / 返航）
• 获取实时视频流与拍照分析
• 管理飞行任务与查看数据报告
• 处理告警与安全事件

请下达指令。</div>
        <span class="msg-time" id="init-time"></span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="cmd-row">
      <span class="cmd-gt">&gt;</span>
      <div class="input-wrap">
        <textarea id="input" class="input-box" placeholder="输入指令或问题，例如：查询软三A01机场状态" rows="1"></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-meta">
      <div class="hint-row">
        <span><span class="kbd">Enter</span> 发送</span>
        <span><span class="kbd">Shift</span>+<span class="kbd">Enter</span> 换行</span>
      </div>
      <div class="input-status" id="input-status">STANDBY</div>
    </div>
  </div>
</div>

<script>
const STREAM_URL = `http://${location.hostname}:3080/api/stream`;
const msgEl   = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const statusEl= document.getElementById('input-status');
let isWaiting = false;

function fmtTime() {
  return new Date().toLocaleTimeString('zh', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
}
document.getElementById('init-time').textContent = fmtTime();

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 96) + 'px';
});
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function scrollEnd() { msgEl.scrollTo({ top: msgEl.scrollHeight, behavior: 'smooth' }); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function mkRow(role, text) {
  const row = document.createElement('div'); row.className = `msg-row ${role}`;
  const av  = document.createElement('div'); av.className = `avatar ${role}`; av.textContent = role === 'bot' ? 'D' : '我';
  const body= document.createElement('div'); body.className = 'msg-body';
  const bub = document.createElement('div'); bub.className = 'bubble'; bub.textContent = text;
  const t   = document.createElement('span'); t.className = 'msg-time'; t.textContent = fmtTime();
  body.append(bub, t); row.append(av, body); msgEl.appendChild(row); scrollEnd();
  return row;
}

function showTyping() {
  const row = document.createElement('div'); row.className = 'msg-row bot'; row.id = 'typing';
  row.innerHTML = `<div class="avatar bot">D</div><div class="msg-body"><div class="bubble typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  msgEl.appendChild(row); scrollEnd();
}
function hideTyping() { document.getElementById('typing')?.remove(); }

function mkStreamBubble() {
  hideTyping();
  const row = document.createElement('div'); row.className = 'msg-row bot';
  const av  = document.createElement('div'); av.className = 'avatar bot'; av.textContent = 'D';
  const body= document.createElement('div'); body.className = 'msg-body';
  const bub = document.createElement('div'); bub.className = 'bubble'; bub.setAttribute('data-streaming','');
  const t   = document.createElement('span'); t.className = 'msg-time'; t.textContent = fmtTime();
  body.append(bub, t); row.append(av, body); msgEl.appendChild(row); scrollEnd();
  return { row, bub, body, t };
}

function updateBub(bub, chunks) { bub.textContent = chunks.join('\n\n'); scrollEnd(); }

function finalizeBub(body, bub, t, chunks) {
  bub.removeAttribute('data-streaming');
  if (chunks.length > 1) {
    const det = document.createElement('details'); det.className = 'thinking';
    const sum = document.createElement('summary'); sum.textContent = `思考过程（${chunks.length} 段）`;
    const tb  = document.createElement('div'); tb.className = 'thinking-body';
    chunks.forEach((c, i) => {
      const d = document.createElement('div'); d.className = 'thought';
      d.innerHTML = `<span class="thought-idx">${String(i+1).padStart(2,'0')}</span>${esc(c)}`;
      tb.appendChild(d);
    });
    det.append(sum, tb); body.insertBefore(det, t);
  }
}

function setWaiting(v) {
  isWaiting = v; sendBtn.disabled = v; inputEl.disabled = v;
  statusEl.textContent = v ? 'PROCESSING' : 'STANDBY';
  statusEl.style.opacity = v ? '0.7' : '0.3';
  statusEl.style.color   = v ? 'var(--amber)' : 'var(--accent)';
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isWaiting) return;
  inputEl.value = ''; inputEl.style.height = 'auto';
  mkRow('user', text); setWaiting(true); showTyping();

  try {
    const res = await fetch(STREAM_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    if (!res.ok || !res.body) throw new Error(`HTTP ${res.status}`);

    const chunks = []; let el = null, buf = '';
    const reader = res.body.getReader(); const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read(); if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n\n'); buf = parts.pop();
      for (const part of parts) {
        for (const line of part.split('\n')) {
          if (!line.startsWith('data: ')) continue;
          let ev; try { ev = JSON.parse(line.slice(6)); } catch { continue; }
          if (ev.type === 'chunk') {
            chunks.push(ev.text);
            if (!el) el = mkStreamBubble();
            updateBub(el.bub, chunks);
          } else if (ev.type === 'done' && el) {
            finalizeBub(el.body, el.bub, el.t, chunks);
          }
        }
      }
    }
    if (!chunks.length) { hideTyping(); mkRow('bot', '（无响应）'); }
  } catch {
    hideTyping(); mkRow('bot', '连接异常，请确认 NanoClaw 服务正在运行。');
  } finally {
    setWaiting(false); inputEl.focus();
  }
}
</script>
</body>
</html>
